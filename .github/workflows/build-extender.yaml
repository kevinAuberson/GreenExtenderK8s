name: CI/CD - Carbon Extender

on:
  push:
    branches: [develop, main]
    paths: 
      - 'extender/**'
      - 'manifests/extender/**'
      - '.github/workflows/build-extender.yaml'
  pull_request:
    branches: [develop, main]
    paths: 
      - 'extender/**'
      - 'manifests/extender/**'

env:
  REGISTRY: ghcr.io
  IMAGE_COMPONENT: extender

jobs:
  lint-python:
    name: Lint Python Code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
      
      - name: Install lint tools
        run: pip install ruff bandit

      - name: Ruff check
        run: ruff check extender/

      - name: Ruff format check
        run: ruff format --check extender/

      - name: Bandit security check
        run: bandit -r extender/ -ll

  test-python:
    name: Test unitaires
    runs-on: ubuntu-latest
    needs: lint-python
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r extender/requirements-dev.txt

      - name: Run pytest
        run: |
          cd extender
          pytest tests/ -v --tb=short

  validate-manifests:
    name: Validate Kubernetes Manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install kubeconfrom
        run: |
          curl -L -o kubeconform.tar.gz \
            https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz
          tar xf kubeconform.tar.gz
          sudo mv kubeconform /usr/local/bin/
      
      - name: Validate manifests
        run: |
          kubeconform -strict -summary \
            -schema-location default \
            -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' \
            manifests/extender/

      - name: yamllint
        uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: manifests/extender/
          config_data: |
            extends: default
            rules:
              line-length: disable
              document-start: disable

  build:
    name: Build & push image
    runs-on: ubuntu-latest
    needs: [lint-python, test-python, validate-manifests]
    if: github.event_name == 'push'
    permissions:
      contents: write
      packages: write
    outputs:
      image-tag: sha-${{ github.sha }}
      image-name: ${{ steps.image.outputs.name }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute lowercase image name
        id: image
        run: echo "name=$(echo '${{ github.repository }}/${{ env.IMAGE_COMPONENT }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./extender
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:${{ github.ref_name }}
            ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy scan (informational)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:sha-${{ github.sha }}
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'

  update-manifest:
    name: Update image tag in manifest
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.ref_name }}
      
      - name: Update image tag in deployment
        run: |
          NEW_IMAGE="${{ env.REGISTRY }}/${{ needs.build.outputs.image-name }}:sha-${{ github.sha }}"

          sed -i "s|image: ${{ env.REGISTRY }}/${{ needs.build.outputs.image-name }}:.*|image: $NEW_IMAGE|" \
            manifests/extender/extender-deployment.yaml
          
          git diff manifests/extender/extender-deployment.yaml
      
      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifests/extender/extender-deployment.yaml
          git commit -m "ci(extender): bump image to sha-${{ github.sha }} [skip ci]" || exit 0
          git push