# Base pod template used by KubernetesExecutor.
# The DAG applies per-task overrides (labels, schedulerName,
# schedulingGates, resources) via executor_config.pod_override.
apiVersion: v1
kind: Pod
metadata:
  name: benchmark-worker
spec:
  containers:
    - name: base
      image: apache/airflow:2.10.5-python3.11
  restartPolicy: Never
